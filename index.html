<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#fbc7da" />
  <title>Étoiles de Nola & James</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>" />
</head>
<body>
  <div id="sync-badge" class="sync-badge" title="Mode de sauvegarde"></div>
  <button id="who-badge" class="who-badge" title="Qui utilise l'app ?"></button>
  <div id="demo-banner" class="demo-banner hidden"></div>

  <header class="app-header">
    <h1>⭐ Tableau de récompenses</h1>
    <p class="subtitle">Je gagne des étoiles quand je fais des efforts ✨ et je les échange contre des récompenses 🎁</p>
    <div class="balances" id="balances"></div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-tab="routines" class="tab active">⭐ Routines</button>
    <button data-tab="punitions" class="tab">⏳ Punitions</button>
    <button data-tab="recompenses" class="tab">🎁 Récompenses</button>
    <button data-tab="reglages" class="tab">⚙️ Réglages</button>
  </nav>

  <main id="view"></main>

  <!-- Modale générique -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-box">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <footer class="app-footer">
    Chaque effort compte, chaque étoile te rapproche de tes récompenses 💖
  </footer>

  <!-- Pour activer la synchro entre appareils, remplis sync.js avec ta config Firebase -->
  <script src="sync.js"></script>
  <script src="app.js"></script>
</body>
</html>
