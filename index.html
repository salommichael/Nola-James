<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#fbc7da" />
  <title>Étoiles de Nola & James</title>
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Étoiles" />
</head>
<body>
  <!-- Coquille minimale : tout (CSS, JS, structure) est chargé frais à chaque ouverture.
       Plus aucun problème de cache : les futures évolutions n'ont pas besoin de toucher ce fichier. -->
  <script>
    (function () {
      var t = Date.now();
      var l = document.createElement("link");
      l.rel = "stylesheet"; l.href = "styles.css?t=" + t;
      document.head.appendChild(l);
      ["sync.js", "app.js"].forEach(function (src) {
        var s = document.createElement("script");
        s.src = src + "?t=" + t; s.async = false;
        document.body.appendChild(s);
      });
    })();
  </script>
</body>
</html>
