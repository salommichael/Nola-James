<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#fbc7da" />
  <title>Étoiles de Nola & James</title>
  <link rel="stylesheet" href="styles.css?v=10" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Étoiles" />
</head>
<body>
  <div id="sync-badge" class="sync-badge" title="Mode de sauvegarde"></div>
  <button id="who-badge" class="who-badge" title="Qui utilise l'app ?"></button>
  <div id="demo-banner" class="demo-banner hidden"></div>

  <main id="view"></main>

  <!-- Modale générique -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-box">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Dock du bas : rubriques (au-dessus) + sélecteur d'enfant (en dessous), toujours visibles -->
  <div class="bottom-dock">
    <nav class="tabs" id="tabs">
      <button data-tab="routines" class="tab">⭐ Routines</button>
      <button data-tab="punitions" class="tab active">⏳ Punitions</button>
      <button data-tab="recompenses" class="tab">🎁 Récompenses</button>
    </nav>
    <nav class="bottom-bar">
      <button class="dock-icon" data-gototab="journal" title="Journal">📒</button>
      <div class="balances" id="balances"></div>
      <button class="dock-icon" data-gototab="reglages" title="Réglages">⚙️</button>
    </nav>
  </div>

  <!-- Pour activer la synchro entre appareils, remplis sync.js avec ta config Firebase -->
  <!-- Chargement anti-cache : horodatage unique à chaque ouverture (toujours la dernière version) -->
  <script>
    (function () {
      var t = Date.now();
      ["sync.js", "app.js"].forEach(function (src) {
        var s = document.createElement("script");
        s.src = src + "?t=" + t;
        s.async = false;
        document.body.appendChild(s);
      });
    })();
  </script>
</body>
</html>
